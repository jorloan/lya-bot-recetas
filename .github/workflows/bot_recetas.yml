name: Bot Recetas LyA

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  procesar-recetas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar bot de recetas
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_GROUP_ID: '-852551974'
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python bot_recetas.py

      - name: Commit y push
        run: |
          git config --local user.email "bot-recetas@lya-agricola.com"
          git config --local user.name "Bot Recetas LyA"
          git add -A
          git diff --staged --quiet || git commit -m "Recetas actualizadas $(date +'%Y-%m-%d %H:%M')"
          git push
        continue-on-error: true
